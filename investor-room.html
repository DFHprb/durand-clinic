<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durand® Future Health | Confidential</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#f8fafb; --surface:#fff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b; --accent:#0d9488; --accent-bg:#f0fdfa; --accent-border:#99f6e4; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.container{max-width:800px;margin:0 auto;padding:3rem 1.5rem;}
.header{text-align:center;margin-bottom:3rem;}
.header .logo{font-size:1.8rem;font-weight:700;margin-bottom:0.2rem;}
.header .logo span{color:var(--accent);}
.header .sub{color:var(--muted);font-size:0.9rem;}
.header .badge{display:inline-block;margin-top:0.8rem;padding:0.25rem 0.8rem;border-radius:99px;background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem;margin-top:2rem;}
.doc-card{display:flex;align-items:center;gap:1rem;padding:1.2rem 1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:0.6rem;text-decoration:none;color:var(--text);transition:all 0.2s;}
.doc-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.06);transform:translateY(-1px);border-color:var(--accent-border);}
.doc-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:0.65rem;}
.doc-icon.html{background:#f0fdfa;color:#0d9488;}
.doc-icon.pptx{background:#fff7ed;color:#ea580c;}
.doc-icon.docx{background:#eff6ff;color:#2563eb;}
.doc-icon.pdf{background:#fff1f2;color:#be123c;}
.doc-info{flex:1;}
.doc-title{font-weight:600;font-size:0.95rem;margin-bottom:0.15rem;}
.doc-desc{font-size:0.8rem;color:var(--muted);}
.doc-date{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted);flex-shrink:0;}
.footer{text-align:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Durand<span>®</span> Future Health</div>
    <div class="sub">Confidential Document Room</div>
    <div class="badge">Authorized Access Only</div>
  </div>

  <div class="section-label">Investor Materials</div>

  <a class="doc-card" href="/strategic.html">
    <div class="doc-icon html">HTML</div>
    <div class="doc-info">
      <div class="doc-title">Strategic Architecture (Interactive)</div>
      <div class="doc-desc">Expandable platform architecture with pipeline, science validation, and channel detail</div>
    </div>
    <div class="doc-date">Mar 2026</div>
  </a>

  <!--
  <a class="doc-card" href="/investor-memo.html">
    <div class="doc-icon docx">DOC</div>
    <div class="doc-info">
      <div class="doc-title">Investor Memorandum</div>
      <div class="doc-desc">Complete opportunity narrative with 23 exhibit slides embedded</div>
    </div>
    <div class="doc-date">Mar 2026</div>
  </a>

  <a class="doc-card" href="/capital.html">
    <div class="doc-icon pptx">DECK</div>
    <div class="doc-info">
      <div class="doc-title">Capital Architecture</div>
      <div class="doc-desc">Bridge to dominance: stepped approach from $2M to $100M</div>
    </div>
    <div class="doc-date">Mar 2026</div>
  </a>
  -->

  <div class="footer">Durand® With You for Life® · Confidential · 2026</div>
</div>
</body>
</html>
